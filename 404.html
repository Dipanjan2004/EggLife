<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Egg Life Foods</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/imgs/svg-image-1.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            background-color: #00A3D8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }
        .notfound {
            max-width: 32rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            color: #521FCC;
        }
        .notfound img { width: 10rem; }
        .notfound .code {
            font-family: f3;
            font-size: 5rem;
            line-height: 1;
            color: #521FCC;
        }
        .notfound h1 {
            font-family: f3;
            font-size: 2rem;
            line-height: 2.2rem;
        }
        .notfound p {
            font-family: f7;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        .notfound a.btn {
            padding: 0.9rem 1.6rem;
            background-color: #E50192;
            color: white;
            font-family: f3;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background-color 0.2s ease;
        }
        .notfound a.btn:hover { background-color: #b50171; }
    </style>
</head>
<body>
    <div class="notfound">
        <img src="/imgs/svg-image-1.svg" alt="Egg Life Foods logo" width="160" height="44">
        <div class="code">404</div>
        <h1>This wrap got lost</h1>
        <p>The page you&rsquo;re looking for doesn&rsquo;t exist or has been moved. Let&rsquo;s get you back to the good stuff.</p>
        <a href="/" class="btn">Back to home &rarr;</a>
    </div>
</body>
</html>
